services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openlinks-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - openlinks

  web:
    image: nginx:alpine
    container_name: openlinks-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
    networks:
      - openlinks

  db:
    image: postgres:alpine
    container_name: openlinks-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-openlinks}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - openlinks-db:/var/lib/postgresql/data
    networks:
      - openlinks

networks:
  openlinks:

volumes:
  openlinks-db:
